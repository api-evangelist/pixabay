description: >-
  FOCUS-aligned FinOps profile for Pixabay. The API is free; there is no invoice or charge from
  Pixabay for API usage. The only operating cost is internal: caching infrastructure to satisfy the
  24-hour cache requirement and honor the 100 RPM ceiling.
notes: Zero direct cost; internal caching infrastructure is the only cost driver.
